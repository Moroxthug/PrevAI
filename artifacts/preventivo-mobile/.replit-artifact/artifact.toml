kind = "mobile"
previewPath = "/preventivo-mobile/"
title = "PreventivoAI Mobile"
version = "1.0.0"
id = "artifacts/preventivo-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/preventivo-mobile/" ]
localPort = 23597

[services.development]
run = "pnpm --filter @workspace/preventivo-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/preventivo-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/preventivo-mobile", "run", "serve" ]

[services.env]
PORT = "23597"
BASE_PATH = "/preventivo-mobile/"

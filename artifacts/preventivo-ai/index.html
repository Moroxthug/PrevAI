<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>prevai – Preventivi Online per Artigiani e Aziende | AI in 30 Secondi</title>
    <meta name="description" content="Crea preventivi professionali in 30 secondi con l'AI. Software di preventivazione per artigiani, PMI e professionisti italiani. Niente Excel, niente errori. Provalo gratis." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="prevai" />
    <!--
      Production: the prerender pipeline (`scripts/prerender-seo.ts`)
      writes the correct per-route <link rel="canonical"> directly into
      every prerendered HTML file, so the snippet below is stripped/
      replaced and never reaches a crawler in prod.

      Dev/preview: the SPA shell is served for every route. The inline
      script below sets a canonical that matches the current URL before
      React mounts, so SEO audits (Lighthouse, Semrush) running against
      the dev preview don't see every page canonicalizing to "/".
      <SeoHead> (react-helmet-async) then refines it per-route after
      hydration.
    -->
    <link id="__canonical" rel="canonical" href="https://www.prevai.it/" />
    <script>
      (function () {
        try {
          var origin = "https://www.prevai.it";
          var p = window.location.pathname || "/";
          if (p.length > 1 && p.charAt(p.length - 1) !== "/") p = p + "/";
          var el = document.getElementById("__canonical");
          if (el) el.setAttribute("href", origin + p);
        } catch (e) {}
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#7C3AED" />

    <!-- Resource hints -->
    <link rel="dns-prefetch" href="https://wa.me" />

    <!-- Self-hosted Inter Variable — preloaded for zero render-blocking -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/inter-latin-wght-normal.woff2"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

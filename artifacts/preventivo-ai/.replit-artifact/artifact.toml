kind = "web"
previewPath = "/"
title = "PreventivoAI"
version = "1.0.0"
id = "artifacts/preventivo-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19328

[services.development]
run = "pnpm --filter @workspace/preventivo-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/preventivo-ai", "run", "build" ]
publicDir = "artifacts/preventivo-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19328"
BASE_PATH = "/"

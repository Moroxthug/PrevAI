openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PreventivoAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quotes
    description: Quote management
  - name: business-profile
    description: Business profile management
  - name: payments
    description: Stripe payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List all quotes for the authenticated user
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a new AI-generated quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteBody"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/stats:
    get:
      operationId: getQuoteStats
      tags: [quotes]
      summary: Get summary statistics for the user's quotes
      responses:
        "200":
          description: Quote statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStats"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get a single quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    put:
      operationId: updateQuote
      tags: [quotes]
      summary: Update a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteBody"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: Delete a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /quotes/{id}/generate-pdf:
    post:
      operationId: generateQuotePdf
      tags: [quotes]
      summary: Generate PDF for a quote (requires paid status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfResult"

  /business-profile:
    get:
      operationId: getBusinessProfile
      tags: [business-profile]
      summary: Get the authenticated user's business profile
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"
    put:
      operationId: updateBusinessProfile
      tags: [business-profile]
      summary: Create or update business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessProfileBody"
      responses:
        "200":
          description: Updated business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"

  /payments/checkout:
    post:
      operationId: createCheckoutSession
      tags: [payments]
      summary: Create a Stripe checkout session to unlock a PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Stripe checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"

  /payments/webhook:
    post:
      operationId: stripeWebhook
      tags: [payments]
      summary: Stripe webhook handler
      responses:
        "200":
          description: OK

  /payments/plans:
    get:
      operationId: getPlans
      tags: [payments]
      summary: Get available pricing plans
      responses:
        "200":
          description: Pricing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    QuoteItem:
      type: object
      properties:
        descrizione:
          type: string
        quantita:
          type: number
        unita:
          type: string
        prezzoUnitario:
          type: number
        totale:
          type: number
      required:
        - descrizione
        - quantita
        - unita
        - prezzoUnitario
        - totale

    QuoteClientData:
      type: object
      properties:
        nome:
          type: string
        indirizzo:
          type: string
      required:
        - nome
        - indirizzo

    Quote:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        clientData:
          $ref: "#/components/schemas/QuoteClientData"
        descrizioneGenerale:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"
        subtotale:
          type: number
        ivaPercentuale:
          type: number
        ivaValore:
          type: number
        totale:
          type: number
        note:
          type: string
        status:
          type: string
          enum: [draft, unlocked, pending_payment]
        pdfUrl:
          type: string
          nullable: true
        rawInput:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - clientData
        - descrizioneGenerale
        - items
        - subtotale
        - ivaPercentuale
        - ivaValore
        - totale
        - note
        - status
        - createdAt
        - updatedAt

    QuoteStats:
      type: object
      properties:
        total:
          type: number
        draft:
          type: number
        unlocked:
          type: number
        pendingPayment:
          type: number
        totalRevenue:
          type: number
        recentQuotes:
          type: array
          items:
            $ref: "#/components/schemas/Quote"
      required:
        - total
        - draft
        - unlocked
        - pendingPayment
        - totalRevenue
        - recentQuotes

    CreateQuoteBody:
      type: object
      properties:
        rawInput:
          type: string
      required:
        - rawInput

    UpdateQuoteBody:
      type: object
      properties:
        clientData:
          $ref: "#/components/schemas/QuoteClientData"
        descrizioneGenerale:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"
        subtotale:
          type: number
        ivaPercentuale:
          type: number
        ivaValore:
          type: number
        totale:
          type: number
        note:
          type: string
        status:
          type: string
          enum: [draft, unlocked, pending_payment]

    PdfResult:
      type: object
      properties:
        pdfUrl:
          type: string
        htmlContent:
          type: string
      required:
        - htmlContent

    BusinessProfile:
      type: object
      properties:
        userId:
          type: string
        companyName:
          type: string
        vatNumber:
          type: string
        address:
          type: string
        logoUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required:
        - userId
        - companyName

    UpdateBusinessProfileBody:
      type: object
      properties:
        companyName:
          type: string
        vatNumber:
          type: string
        address:
          type: string
        logoUrl:
          type: string
        phone:
          type: string
        email:
          type: string

    CreateCheckoutBody:
      type: object
      properties:
        quoteId:
          type: string
        planType:
          type: string
          enum: [monthly_basic, monthly_premium, oneshot_watermark, oneshot_clean]
      required:
        - planType

    CheckoutResult:
      type: object
      properties:
        url:
          type: string
        sessionId:
          type: string
      required:
        - url
        - sessionId

    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        interval:
          type: string
          nullable: true
        features:
          type: array
          items:
            type: string
        hasWatermark:
          type: boolean
        quotaPerMonth:
          type: number
          nullable: true
      required:
        - id
        - name
        - price
        - currency
        - features
        - hasWatermark
